<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARA TI</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body.container-view { 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fce4ec;
        }
        
        .container {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }

        #input-box.show { display: block; }
        #confession-box.show { display: block; }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 20px;
            border: 1px solid #ff80ab;
            outline: none;
        }

        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body class="container-view">

    <div id="input-box" class="container show">
        <h2>Por favor, introduzca su nombre. 😳</h2>
        <input type="text" id="name-input" placeholder="Nombre de la persona...">
        <button id="submit-btn">Submit</button>
    </div>

    <div id="confession-box" class="container">
        <p id="text-typing"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
